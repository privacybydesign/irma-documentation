<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1ABC9C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A085;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#2C3E50" text-anchor="middle">Defense in Depth: Layered Security Model</text>
  <text x="400" y="58" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#7F8C8D" text-anchor="middle">Each layer blocks different attack vectors - no single point of failure</text>

  <!-- Concentric circles visualization -->
  <g transform="translate(200, 280)">
    <!-- Outer ring - Layer 4 -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#layer4Grad)" stroke-width="35" opacity="0.3"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#layer4Grad)" stroke-width="3"/>

    <!-- Layer 3 -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#layer3Grad)" stroke-width="35" opacity="0.3"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#layer3Grad)" stroke-width="3"/>

    <!-- Layer 2 -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#layer2Grad)" stroke-width="35" opacity="0.3"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#layer2Grad)" stroke-width="3"/>

    <!-- Layer 1 - Core -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#layer1Grad)" stroke-width="35" opacity="0.3"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#layer1Grad)" stroke-width="3"/>

    <!-- Center - Protected Asset -->
    <circle cx="0" cy="0" r="25" fill="#2C3E50"/>
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="8" fill="white" text-anchor="middle">CREDENTIAL</text>

    <!-- Layer labels on rings -->
    <text x="0" y="-45" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#117864" text-anchor="middle" font-weight="bold">L1</text>
    <text x="0" y="-85" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#1A5276" text-anchor="middle" font-weight="bold">L2</text>
    <text x="0" y="-125" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6C3483" text-anchor="middle" font-weight="bold">L3</text>
    <text x="0" y="-165" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#A04000" text-anchor="middle" font-weight="bold">L4</text>
  </g>

  <!-- Legend boxes on the right -->
  <g transform="translate(430, 90)">
    <!-- Layer 1 -->
    <rect x="0" y="0" width="340" height="85" rx="8" fill="white" filter="url(#shadow2)"/>
    <rect x="0" y="0" width="8" height="85" rx="4" fill="url(#layer1Grad)"/>
    <text x="20" y="22" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1ABC9C">Layer 1: Server-Side Passport Verification</text>
    <text x="20" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#5D6D7E">Cryptographic proof that passport is authentic</text>
    <text x="20" y="55" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#E74C3C">Privacy: Nationality revealed</text>
    <text x="20" y="70" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#27AE60">Security: CRITICAL - Blocks forged data</text>
    <text x="300" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#1ABC9C" text-anchor="middle">🔐</text>

    <!-- Layer 2 -->
    <rect x="0" y="95" width="340" height="85" rx="8" fill="white" filter="url(#shadow2)"/>
    <rect x="0" y="95" width="8" height="85" rx="4" fill="url(#layer2Grad)"/>
    <text x="20" y="117" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#3498DB">Layer 2: App Attestation</text>
    <text x="20" y="135" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#5D6D7E">Play Integrity / App Attest verification</text>
    <text x="20" y="150" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#E74C3C">Privacy: Platform learns usage</text>
    <text x="20" y="165" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#27AE60">Security: HIGH - Blocks modified apps</text>
    <text x="300" y="140" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#3498DB" text-anchor="middle">📱</text>

    <!-- Layer 3 -->
    <rect x="0" y="190" width="340" height="85" rx="8" fill="white" filter="url(#shadow2)"/>
    <rect x="0" y="190" width="8" height="85" rx="4" fill="url(#layer3Grad)"/>
    <text x="20" y="212" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#9B59B6">Layer 3: On-Device Biometrics</text>
    <text x="20" y="230" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#5D6D7E">Face matching stays local for privacy</text>
    <text x="20" y="245" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#27AE60">Privacy: MAXIMUM - Data never leaves device</text>
    <text x="20" y="260" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#F39C12">Security: MEDIUM - Acceptable tradeoff</text>
    <text x="300" y="235" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#9B59B6" text-anchor="middle">👤</text>

    <!-- Layer 4 -->
    <rect x="0" y="285" width="340" height="85" rx="8" fill="white" filter="url(#shadow2)"/>
    <rect x="0" y="285" width="8" height="85" rx="4" fill="url(#layer4Grad)"/>
    <text x="20" y="307" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#E67E22">Layer 4: Active Liveness Challenges</text>
    <text x="20" y="325" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#5D6D7E">Server-generated random challenges</text>
    <text x="20" y="340" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#27AE60">Privacy: Minimal impact</text>
    <text x="20" y="355" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#27AE60">Security: HIGH - Blocks spoofing attacks</text>
    <text x="300" y="330" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#E67E22" text-anchor="middle">🎭</text>
  </g>

  <!-- Attack arrows blocked by layers -->
  <g transform="translate(200, 280)">
    <!-- Attack arrow 1 - blocked by outer layer -->
    <path d="M-220,80 L-180,50" stroke="#E74C3C" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="-180,50 -195,52 -188,63" fill="#E74C3C"/>
    <text x="-230" y="95" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#E74C3C" text-anchor="end">Video replay</text>

    <!-- Attack arrow 2 -->
    <path d="M-220,0 L-140,0" stroke="#E74C3C" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="-140,0 -155,-5 -155,5" fill="#E74C3C"/>
    <text x="-230" y="5" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#E74C3C" text-anchor="end">Root/hook</text>

    <!-- Attack arrow 3 -->
    <path d="M-220,-80 L-100,-45" stroke="#E74C3C" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="-100,-45 -115,-50 -108,-38" fill="#E74C3C"/>
    <text x="-230" y="-75" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#E74C3C" text-anchor="end">Modified APK</text>

    <!-- Attack arrow 4 -->
    <path d="M-200,-150 L-60,-70" stroke="#E74C3C" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="-60,-70 -75,-68 -72,-78" fill="#E74C3C"/>
    <text x="-210" y="-145" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#E74C3C" text-anchor="end">Fake data</text>
  </g>

  <!-- Bottom summary -->
  <rect x="30" y="450" width="740" height="40" rx="8" fill="#2C3E50"/>
  <text x="400" y="472" font-family="Inter, system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">Each layer an attacker must bypass increases the cost and complexity of fraud exponentially</text>
  <text x="400" y="485" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#BDC3C7" text-anchor="middle">Layer 1 (passport verification) is currently missing - this is the critical vulnerability</text>
</svg>