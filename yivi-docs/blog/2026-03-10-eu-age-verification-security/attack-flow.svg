<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 420">
  <defs>
    <linearGradient id="attackerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A252F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8E44AD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C3483;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="resultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E74C3C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="850" height="420" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="425" y="32" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#2C3E50" text-anchor="middle">Attack Vector: How a Modified App Bypasses Age Verification</text>
  <text x="425" y="52" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#E74C3C" text-anchor="middle">Estimated time to implement: 2-4 hours with basic reverse engineering skills</text>

  <!-- Step 1: Attacker -->
  <g transform="translate(30, 90)">
    <rect width="140" height="110" rx="10" fill="url(#attackerGrad)" filter="url(#shadow3)"/>
    <text x="70" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">STEP 1</text>
    <text x="70" y="50" font-family="Inter, system-ui, sans-serif" font-size="28" text-anchor="middle">🧑‍💻</text>
    <text x="70" y="75" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#BDC3C7" text-anchor="middle">Attacker downloads</text>
    <text x="70" y="88" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#BDC3C7" text-anchor="middle">official APK from</text>
    <text x="70" y="101" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#BDC3C7" text-anchor="middle">GitHub/Play Store</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M180 145 L220 145" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step 2: Decompile -->
  <g transform="translate(230, 90)">
    <rect width="140" height="110" rx="10" fill="url(#toolGrad)" filter="url(#shadow3)"/>
    <text x="70" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">STEP 2</text>
    <text x="70" y="55" font-family="Inter, system-ui, sans-serif" font-size="10" fill="white" text-anchor="middle">Decompile with</text>
    <text x="70" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#F5B7B1" text-anchor="middle">apktool / jadx</text>
    <text x="70" y="90" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D7BDE2" text-anchor="middle">Extract smali code</text>
    <text x="70" y="102" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D7BDE2" text-anchor="middle">and resources</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M380 145 L420 145" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step 3: Modify -->
  <g transform="translate(430, 90)">
    <rect width="170" height="110" rx="10" fill="url(#toolGrad)" filter="url(#shadow3)"/>
    <text x="85" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">STEP 3</text>
    <text x="85" y="50" font-family="Inter, system-ui, sans-serif" font-size="10" fill="white" text-anchor="middle">Modify verification code:</text>
    <text x="85" y="68" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#F5B7B1" text-anchor="middle">verifyHT() → return true</text>
    <text x="85" y="80" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#F5B7B1" text-anchor="middle">verifyDS() → return true</text>
    <text x="85" y="92" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#F5B7B1" text-anchor="middle">faceMatch() → return true</text>
    <text x="85" y="104" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#F5B7B1" text-anchor="middle">birth_date = "1990-01-01"</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M610 145 L650 145" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step 4: Recompile -->
  <g transform="translate(660, 90)">
    <rect width="150" height="110" rx="10" fill="url(#toolGrad)" filter="url(#shadow3)"/>
    <text x="75" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">STEP 4</text>
    <text x="75" y="55" font-family="Inter, system-ui, sans-serif" font-size="10" fill="white" text-anchor="middle">Recompile &amp; sign</text>
    <text x="75" y="75" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D7BDE2" text-anchor="middle">apktool b output/</text>
    <text x="75" y="90" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D7BDE2" text-anchor="middle">jarsigner with</text>
    <text x="75" y="103" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D7BDE2" text-anchor="middle">debug keystore</text>
  </g>

  <!-- Step 5 - install and use -->
  <g transform="translate(230, 230)">
    <rect width="170" height="100" rx="10" fill="#34495E" filter="url(#shadow3)"/>
    <text x="85" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">STEP 5</text>
    <text x="85" y="48" font-family="Inter, system-ui, sans-serif" font-size="26" text-anchor="middle">📱</text>
    <text x="85" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#BDC3C7" text-anchor="middle">Install modified app</text>
    <text x="85" y="87" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#BDC3C7" text-anchor="middle">Request credential</text>
  </g>

  <!-- Arrow to issuer -->
  <path d="M410 280 L490 280" stroke="#E74C3C" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <text x="450" y="270" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7F8C8D" text-anchor="middle">birth_date:</text>
  <text x="450" y="298" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7F8C8D" text-anchor="middle">"1990-01-01"</text>

  <!-- Issuer box -->
  <g transform="translate(500, 230)">
    <rect width="140" height="100" rx="10" fill="#5D6D7E" filter="url(#shadow3)"/>
    <text x="70" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">ISSUER</text>
    <text x="70" y="48" font-family="Inter, system-ui, sans-serif" font-size="26" text-anchor="middle">🏛️</text>
    <text x="70" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#BDC3C7" text-anchor="middle">Receives birth_date</text>
    <text x="70" y="87" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#F5B7B1" text-anchor="middle">Cannot verify source</text>
  </g>

  <!-- Arrow to credential -->
  <path d="M650 280 L700 280" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Fraudulent credential -->
  <g transform="translate(710, 230)">
    <rect width="120" height="100" rx="10" fill="url(#resultGrad)" filter="url(#shadow3)"/>
    <text x="60" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">RESULT</text>
    <text x="60" y="50" font-family="Inter, system-ui, sans-serif" font-size="26" text-anchor="middle">🎫</text>
    <text x="60" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="white" text-anchor="middle">Fraudulent</text>
    <text x="60" y="87" font-family="Inter, system-ui, sans-serif" font-size="10" fill="white" text-anchor="middle">credential issued</text>
  </g>

  <!-- Connecting arrow from step 4 to step 5 -->
  <path d="M735 200 L735 225 L400 225 L400 230" stroke="#E74C3C" stroke-width="2" fill="none"/>
  <polygon points="400,230 395,220 405,220" fill="#E74C3C"/>

  <!-- Alternative: Frida approach -->
  <g transform="translate(30, 250)">
    <rect width="180" height="130" rx="8" fill="#FCF3CF" stroke="#F4D03F" stroke-width="2"/>
    <text x="90" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" fill="#7D6608" text-anchor="middle">ALTERNATIVE: FRIDA</text>
    <text x="90" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7D6608" text-anchor="middle">No APK modification needed:</text>
    <text x="90" y="68" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#5D4E37" text-anchor="middle">1. Root device</text>
    <text x="90" y="82" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#5D4E37" text-anchor="middle">2. Install Frida server</text>
    <text x="90" y="96" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#5D4E37" text-anchor="middle">3. Hook verification functions</text>
    <text x="90" y="110" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#5D4E37" text-anchor="middle">4. Return success for all checks</text>
    <text x="90" y="124" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#E74C3C" text-anchor="middle" font-weight="bold">Same result, less effort</text>
  </g>

  <!-- Bottom warning -->
  <rect x="30" y="385" width="790" height="28" rx="6" fill="#FADBD8"/>
  <text x="425" y="404" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#922B21" text-anchor="middle" font-weight="bold">The issuer has no cryptographic proof that verification occurred - it simply trusts the app's claim</text>
</svg>